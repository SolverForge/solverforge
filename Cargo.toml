[workspace]
members = ["solverforge-core", "solverforge-derive", "solverforge-python", "solverforge-service"]
resolver = "2"

[workspace.package]
version = "0.1.56"
edition = "2021"
license = "Apache-2.0"
repository = "https://github.com/solverforge/solverforge"

[workspace.dependencies]
# Error handling
thiserror = "1.0"

# Logging
log = { version = "0.4", features = ["std"] }

# Utilities
once_cell = "1.0"

# Decimal arithmetic for value ranges and scores
rust_decimal = "1.33"

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
indexmap = { version = "2.0", features = ["serde"] }

# HTTP client (for future phases)
reqwest = { version = "0.12", features = ["json", "blocking"] }

# WASM generation (for future phases)
wasm-encoder = "0.221"

# Async runtime (for future phases)
tokio = { version = "1.0", features = ["rt-multi-thread", "macros", "process"] }

# Base64 encoding for WASM binary (for future phases)
base64 = "0.22"

# Python bindings
pyo3 = { version = "0.23" }

# Unix-specific
libc = "0.2"

# Filesystem
dirs = "5.0"

# Testing
criterion = "0.5"
proptest = "1.0"
mockall = "0.13"
tempfile = "3.0"
