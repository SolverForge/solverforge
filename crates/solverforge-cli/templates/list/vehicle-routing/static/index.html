<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SolverForge — Vehicle Routing</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 900px; margin: 40px auto; padding: 0 20px; color: #222; }
    h1 { font-size: 1.6rem; }
    button { padding: 8px 16px; margin-right: 8px; cursor: pointer; border: none; border-radius: 4px; background: #0066cc; color: white; font-size: 0.95rem; }
    button:hover { background: #0052a3; }
    #stopBtn { background: #cc2200; display: none; }
    #output { margin-top: 20px; }
    .score { font-weight: bold; }
    .feasible { color: #2a7a2a; }
    .infeasible { color: #cc2200; }
    table { border-collapse: collapse; width: 100%; }
    td, th { border: 1px solid #ccc; padding: 6px 10px; text-align: left; }
    th { background: #f0f0f0; }
  </style>
</head>
<body>
  <h1>SolverForge — Vehicle Routing</h1>
  <p>Posts the demo instance to <code>POST /solutions</code>, polls for results, and renders routes.</p>

  <button onclick="solve()">Solve Demo</button>
  <button id="stopBtn" onclick="stop()">Stop</button>

  <div id="output"></div>

  <script>
    let currentId = null;
    let poll = null;

    async function solve() {
      const demoRes = await fetch('/demo-data');
      const instance = await demoRes.json();
      const res = await fetch('/solutions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(instance),
      });
      currentId = await res.text();
      document.getElementById('stopBtn').style.display = 'inline';
      poll = setInterval(refresh, 1000);
    }

    async function refresh() {
      if (!currentId) return;
      const res = await fetch(`/solutions/${currentId}`);
      if (!res.ok) return;
      const sol = await res.json();
      render(sol);
      if (sol.solverStatus === 'NOT_SOLVING') {
        clearInterval(poll);
        document.getElementById('stopBtn').style.display = 'none';
      }
    }

    async function stop() {
      if (!currentId) return;
      await fetch(`/solutions/${currentId}`, { method: 'DELETE' });
      clearInterval(poll);
      document.getElementById('stopBtn').style.display = 'none';
    }

    function render(sol) {
      const feasible = sol.score && !sol.score.includes('-');
      const cls = feasible ? 'feasible' : 'infeasible';
      let html = `<p>Cost: <span class="score ${cls}">${sol.cost}</span>  Score: <span class="score ${cls}">${sol.score || '—'}</span>  Status: ${sol.solverStatus}</p>`;
      html += '<table><tr><th>Vehicle</th><th>Route (depot → … → depot)</th><th>Stops</th></tr>';
      sol.routes.forEach((route, i) => {
        html += `<tr><td>Vehicle ${i + 1}</td><td>0 → ${route.join(' → ')} → 0</td><td>${route.length}</td></tr>`;
      });
      html += '</table>';
      document.getElementById('output').innerHTML = html;
    }
  </script>
</body>
</html>
