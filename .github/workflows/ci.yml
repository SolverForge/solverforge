name: CI

on:
  push:
    branches: [main, release/*]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  JAVA_HOME: /usr/lib/jvm/temurin-24-jdk-amd64
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  rust:
    name: Rust ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --exclude solverforge-python -- -D warnings

      - name: Build
        run: cargo build --workspace --exclude solverforge-python

      - name: Run tests (excluding Python and integration)
        run: cargo test --workspace --exclude solverforge-python --exclude solverforge-service

  java:
    name: Java Service
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Build and test
        run: cd solverforge-wasm-service && mvn verify

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [rust, java]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up JDK 24
        uses: actions/setup-java@v4
        with:
          java-version: '24'
          distribution: 'temurin'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Run integration tests
        run: cargo test -p solverforge-service --test solve_integration
        env:
          RUST_LOG: info
